<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Fake PAX Terminal{% endblock %}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <style>
    :root {
      --bg:      #f1f5f9;
      --surface: #ffffff;
      --border:  #e2e8f0;
      --text:    #1e293b;
      --muted:   #64748b;
      --nav-bg:  #1e293b;
    }
    body            { background: var(--bg); color: var(--text); font-size: .92rem; }
    .navbar         { background: var(--nav-bg) !important; border-bottom: 1px solid #0f172a; }
    .card           { background: var(--surface); border: 1px solid var(--border); box-shadow: 0 1px 3px rgba(0,0,0,.06); }
    .card-header    { background: #f8fafc; border-bottom: 1px solid var(--border); }
    .table          { --bs-table-bg: transparent; --bs-table-striped-bg: #f8fafc; color: var(--text); }
    .table td, .table th { border-color: var(--border); vertical-align: middle; }
    .text-muted     { color: var(--muted) !important; }
    pre.log-block   { background: #1e293b; color: #94a3b8; font-size: .78rem; border: 1px solid var(--border);
                      border-radius: .5rem; padding: 1rem; max-height: 72vh; overflow-y: auto; }
    .stat-card      { border-left: 4px solid; }
    .stat-card.approved { border-color: #22c55e; }
    .stat-card.declined { border-color: #ef4444; }
    .stat-card.total    { border-color: #3b82f6; }
    .stat-card.other    { border-color: #a855f7; }
    .badge-APPROVED  { background: #16a34a !important; }
    .badge-DECLINED  { background: #dc2626 !important; }
    .badge-CANCELLED { background: #d97706 !important; }
    .badge-OK        { background: #2563eb !important; }
    .mono           { font-family: monospace; }
    a.nav-link:hover { color: #fff !important; }
    .table-hover tbody tr:hover { background: #f0f9ff; }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
  <nav class="navbar navbar-dark mb-4 px-3">
    <a class="navbar-brand fw-bold" href="/">&#128421; Fake PAX Terminal</a>
    <div class="d-flex gap-3 align-items-center">
      <a href="/" class="nav-link text-light {% if request.path == '/' %}fw-semibold{% endif %}">Dashboard</a>
      <a href="/transactions" class="nav-link text-light {% if request.path == '/transactions' %}fw-semibold{% endif %}">Transactions</a>
      <a href="/log" class="nav-link text-light {% if request.path == '/log' %}fw-semibold{% endif %}">Log</a>
    </div>
  </nav>

  <div class="container-fluid px-4">
    {% block content %}{% endblock %}
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
